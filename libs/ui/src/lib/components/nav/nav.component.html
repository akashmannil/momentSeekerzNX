<header
  class="fixed top-0 left-0 right-0 z-30 transition-all duration-500"
  [ngClass]="{
    'py-6': !scrolled,
    'py-4': scrolled,
    'bg-obsidian-950/90': scrolled,
    'backdrop-blur-md': scrolled,
    'border-b': scrolled,
    'border-white/5': scrolled
  }"
>
  <nav class="max-w-7xl mx-auto px-6 flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="font-display text-xl tracking-wide hover:text-gold-400 transition-colors">
      Savage Media
    </a>

    <!-- Desktop links -->
    <ul class="hidden md:flex items-center gap-8">
      <li><a routerLink="/services" routerLinkActive="text-gold-400" class="section-label hover:text-gold-400 transition-colors">Services</a></li>
      <li><a routerLink="/pricing" routerLinkActive="text-gold-400" class="section-label hover:text-gold-400 transition-colors">Pricing</a></li>
      <li><a routerLink="/gallery" routerLinkActive="text-gold-400" class="section-label hover:text-gold-400 transition-colors">Gallery</a></li>
      <li><a routerLink="/about" routerLinkActive="text-gold-400" class="section-label hover:text-gold-400 transition-colors">About</a></li>
      <li><a routerLink="/contact" routerLinkActive="text-gold-400" class="section-label hover:text-gold-400 transition-colors">Contact</a></li>
      <li>
        <a
          routerLink="/cart"
          routerLinkActive="text-gold-400"
          class="section-label hover:text-gold-400 transition-colors relative inline-flex items-center gap-2"
          aria-label="Cart"
        >
          Cart
          <span
            *ngIf="(cartCount$ | async) as count"
            class="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 text-[10px] font-medium bg-gold-400 text-obsidian-950 rounded-full"
          >{{ count }}</span>
        </a>
      </li>
      <li><a routerLink="/booking" class="btn-primary py-2 px-4">Book Now</a></li>
      <li *ngIf="isAdmin$ | async">
        <a routerLink="/admin" class="section-label text-gold-400 hover:text-white transition-colors">Admin</a>
      </li>
      <li *ngIf="isAuthenticated$ | async">
        <button (click)="logout()" class="section-label text-white/40 hover:text-white transition-colors">Sign Out</button>
      </li>
      <li *ngIf="!(isAuthenticated$ | async)">
        <a routerLink="/login" class="section-label text-white/40 hover:text-white transition-colors">Sign In</a>
      </li>
    </ul>

    <!-- Mobile menu toggle -->
    <button
      class="md:hidden flex flex-col gap-1.5 p-2"
      (click)="toggleNav(!navOpen)"
      aria-label="Toggle menu"
    >
      <span class="w-6 h-px bg-white transition-all"></span>
      <span class="w-4 h-px bg-white transition-all"></span>
      <span class="w-6 h-px bg-white transition-all"></span>
    </button>
  </nav>

  <!-- Mobile menu drawer -->
  <div
    *ngIf="navOpen$ | async"
    class="md:hidden bg-obsidian-900/95 backdrop-blur-lg border-t border-white/10 px-6 py-8"
  >
    <ul class="space-y-6">
      <li><a routerLink="/services" (click)="toggleNav(false)" class="section-label block hover:text-gold-400">Services</a></li>
      <li><a routerLink="/pricing" (click)="toggleNav(false)" class="section-label block hover:text-gold-400">Pricing</a></li>
      <li><a routerLink="/gallery" (click)="toggleNav(false)" class="section-label block hover:text-gold-400">Gallery</a></li>
      <li><a routerLink="/about" (click)="toggleNav(false)" class="section-label block hover:text-gold-400">About</a></li>
      <li><a routerLink="/contact" (click)="toggleNav(false)" class="section-label block hover:text-gold-400">Contact</a></li>
      <li>
        <a routerLink="/cart" (click)="toggleNav(false)" class="section-label flex items-center gap-2 hover:text-gold-400">
          Cart
          <span
            *ngIf="(cartCount$ | async) as count"
            class="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 text-[10px] font-medium bg-gold-400 text-obsidian-950 rounded-full"
          >{{ count }}</span>
        </a>
      </li>
      <li><a routerLink="/booking" (click)="toggleNav(false)" class="section-label block text-gold-400">Book Now</a></li>
    </ul>
  </div>
</header>
