<header
  class="fixed top-0 left-0 right-0 z-30 transition-all duration-[350ms]"
  [ngClass]="{
    'py-5': !scrolled,
    'py-3': scrolled,
    'bg-black/95': scrolled,
    'backdrop-blur-xl': scrolled,
    'border-b': scrolled,
    'border-white/[0.06]': scrolled
  }"
>
  <nav class="max-w-7xl mx-auto px-6 flex items-center justify-between gap-8">

    <!-- Logo -->
    <a
      routerLink="/"
      class="font-body text-sm font-bold tracking-tight text-white hover:text-gold-400 transition-colors duration-[200ms] shrink-0"
    >
      Savage Media
    </a>

    <!-- Desktop nav links -->
    <ul class="hidden md:flex items-center gap-1 flex-1 justify-center">
      <li>
        <a routerLink="/services" routerLinkActive="!text-white !bg-white/[0.07]"
           class="section-label block px-4 py-2 rounded-pill text-white/50 hover:text-white hover:bg-white/[0.05] transition-all duration-[200ms]">
          Services
        </a>
      </li>
      <li>
        <a routerLink="/pricing" routerLinkActive="!text-white !bg-white/[0.07]"
           class="section-label block px-4 py-2 rounded-pill text-white/50 hover:text-white hover:bg-white/[0.05] transition-all duration-[200ms]">
          Pricing
        </a>
      </li>
      <li>
        <a routerLink="/gallery" routerLinkActive="!text-white !bg-white/[0.07]"
           class="section-label block px-4 py-2 rounded-pill text-white/50 hover:text-white hover:bg-white/[0.05] transition-all duration-[200ms]">
          Gallery
        </a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="!text-white !bg-white/[0.07]"
           class="section-label block px-4 py-2 rounded-pill text-white/50 hover:text-white hover:bg-white/[0.05] transition-all duration-[200ms]">
          About
        </a>
      </li>
      <li>
        <a routerLink="/contact" routerLinkActive="!text-white !bg-white/[0.07]"
           class="section-label block px-4 py-2 rounded-pill text-white/50 hover:text-white hover:bg-white/[0.05] transition-all duration-[200ms]">
          Contact
        </a>
      </li>
      <li>
        <a
          routerLink="/cart"
          routerLinkActive="!text-white !bg-white/[0.07]"
          class="section-label inline-flex items-center gap-2 px-4 py-2 rounded-pill text-white/50 hover:text-white hover:bg-white/[0.05] transition-all duration-[200ms]"
          aria-label="Cart"
        >
          Cart
          <span
            *ngIf="(cartCount$ | async) as count"
            class="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 text-[10px] font-semibold bg-gold-400 text-white rounded-full"
          >{{ count }}</span>
        </a>
      </li>
    </ul>

    <!-- Right-side actions -->
    <div class="hidden md:flex items-center gap-2 shrink-0">
      <ng-container *ngIf="isAdmin$ | async">
        <a routerLink="/admin"
           class="section-label px-4 py-2 text-gold-400 hover:text-white transition-colors duration-[200ms]">
          Admin
        </a>
      </ng-container>

      <ng-container *ngIf="isAuthenticated$ | async; else signIn">
        <button
          (click)="logout()"
          class="section-label px-4 py-2 text-white/30 hover:text-white transition-colors duration-[200ms]">
          Sign Out
        </button>
      </ng-container>
      <ng-template #signIn>
        <a routerLink="/login"
           class="section-label px-4 py-2 text-white/50 hover:text-white transition-colors duration-[200ms]">
          Sign In
        </a>
      </ng-template>

      <a routerLink="/booking" class="btn-primary">Book Now</a>
    </div>

    <!-- Mobile hamburger -->
    <button
      class="md:hidden flex flex-col gap-[5px] p-2 focus:outline-none focus-visible:ring-2 focus-visible:ring-gold-400 rounded"
      (click)="toggleNav(!navOpen)"
      aria-label="Toggle menu"
      [attr.aria-expanded]="navOpen"
    >
      <span class="w-6 h-px bg-white origin-center transition-all duration-[350ms]"
            [ngClass]="{'rotate-45 translate-y-[6px]': navOpen}"></span>
      <span class="h-px bg-white transition-all duration-[350ms]"
            [ngClass]="{'opacity-0 w-0': navOpen, 'w-4': !navOpen}"></span>
      <span class="w-6 h-px bg-white origin-center transition-all duration-[350ms]"
            [ngClass]="{'-rotate-45 -translate-y-[6px]': navOpen}"></span>
    </button>

  </nav>

  <!-- Mobile drawer -->
  <div
    *ngIf="navOpen$ | async"
    class="md:hidden bg-black border-t border-white/[0.06] px-5 py-6"
  >
    <ul class="space-y-1 mb-6">
      <li><a routerLink="/services" (click)="toggleNav(false)" class="section-label flex px-4 py-3 rounded-pill-sm hover:bg-white/[0.05] hover:text-white transition-all duration-[200ms]">Services</a></li>
      <li><a routerLink="/pricing"  (click)="toggleNav(false)" class="section-label flex px-4 py-3 rounded-pill-sm hover:bg-white/[0.05] hover:text-white transition-all duration-[200ms]">Pricing</a></li>
      <li><a routerLink="/gallery"  (click)="toggleNav(false)" class="section-label flex px-4 py-3 rounded-pill-sm hover:bg-white/[0.05] hover:text-white transition-all duration-[200ms]">Gallery</a></li>
      <li><a routerLink="/about"    (click)="toggleNav(false)" class="section-label flex px-4 py-3 rounded-pill-sm hover:bg-white/[0.05] hover:text-white transition-all duration-[200ms]">About</a></li>
      <li><a routerLink="/contact"  (click)="toggleNav(false)" class="section-label flex px-4 py-3 rounded-pill-sm hover:bg-white/[0.05] hover:text-white transition-all duration-[200ms]">Contact</a></li>
      <li>
        <a routerLink="/cart" (click)="toggleNav(false)"
           class="section-label flex items-center gap-2 px-4 py-3 rounded-pill-sm hover:bg-white/[0.05] hover:text-white transition-all duration-[200ms]">
          Cart
          <span
            *ngIf="(cartCount$ | async) as count"
            class="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 text-[10px] font-semibold bg-gold-400 text-white rounded-full"
          >{{ count }}</span>
        </a>
      </li>
    </ul>

    <div class="flex flex-col gap-3">
      <a routerLink="/booking" (click)="toggleNav(false)" class="btn-primary justify-center">Book Now</a>
      <ng-container *ngIf="isAuthenticated$ | async; else mobileSignIn">
        <button (click)="logout(); toggleNav(false)" class="btn-ghost justify-center">Sign Out</button>
      </ng-container>
      <ng-template #mobileSignIn>
        <a routerLink="/login" (click)="toggleNav(false)" class="btn-ghost justify-center">Sign In</a>
      </ng-template>
    </div>
  </div>
</header>
