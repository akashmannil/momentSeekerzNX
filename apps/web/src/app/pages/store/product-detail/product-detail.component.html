<div class="min-h-screen pt-24 pb-16 px-6 page-enter" *ngIf="product$ | async as product; else loading">
  <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12">
    <!-- Image -->
    <div>
      <img [src]="product.imageUrl" [alt]="product.title" class="w-full h-auto shadow-2xl" />
    </div>

    <!-- Details -->
    <div>
      <a routerLink="/store" class="section-label text-white/40 hover:text-white mb-6 block">← All Prints</a>
      <h1 class="font-display text-5xl font-light mb-4">{{ product.title }}</h1>
      <p class="font-body text-white/60 leading-relaxed mb-8">{{ product.description }}</p>

      <!-- Variant selection -->
      <div class="mb-6">
        <p class="section-label mb-3">Select Size & Finish</p>
        <div class="grid grid-cols-2 gap-2">
          <button
            *ngFor="let variant of product.variants"
            (click)="selectVariant(variant)"
            [class.border-gold-400]="selectedVariant === variant"
            [class.text-gold-400]="selectedVariant === variant"
            class="glass-panel p-3 text-left border border-white/10 hover:border-gold-400 transition-colors"
          >
            <span class="block text-sm font-medium">{{ variant.size }}</span>
            <span class="block text-xs text-white/40 mt-0.5 capitalize">{{ variant.finish }}</span>
            <span class="block section-label text-gold-400 mt-2">${{ variant.price | number:'1.2-2' }}</span>
          </button>
        </div>
      </div>

      <!-- Quantity -->
      <div class="flex items-center gap-4 mb-8">
        <p class="section-label">Quantity</p>
        <div class="flex items-center gap-3">
          <button (click)="quantity = quantity > 1 ? quantity - 1 : 1" class="text-white/50 hover:text-white">−</button>
          <span class="font-body w-8 text-center">{{ quantity }}</span>
          <button (click)="quantity = quantity + 1" class="text-white/50 hover:text-white">+</button>
        </div>
      </div>

      <button
        (click)="addToCart(product)"
        [disabled]="!selectedVariant"
        class="btn-primary w-full justify-center"
        [class.opacity-40]="!selectedVariant"
        [class.cursor-not-allowed]="!selectedVariant"
      >
        {{ selectedVariant ? 'Add to Cart' : 'Select a Size & Finish' }}
      </button>

      <p class="text-white/30 text-xs text-center mt-3">Free shipping on orders over $150</p>
    </div>
  </div>
</div>

<ng-template #loading>
  <div class="flex items-center justify-center min-h-screen">
    <div class="w-px h-24 bg-gold-400 animate-pulse"></div>
  </div>
</ng-template>

<sm-cart-sidebar [isOpen]="cartOpen" (closed)="cartOpen = false"></sm-cart-sidebar>
