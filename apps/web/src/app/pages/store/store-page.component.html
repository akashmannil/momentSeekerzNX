<div class="min-h-screen page-enter">
  <!-- Hero -->
  <header class="relative pt-36 pb-20 px-6 text-center overflow-hidden">
    <img [src]="images.heroStore" alt="" loading="eager" aria-hidden="true" class="absolute inset-0 w-full h-full object-cover opacity-30" />
    <div class="absolute inset-0 bg-gradient-to-b from-obsidian-950/60 via-obsidian-950/80 to-obsidian-950"></div>

    <div class="relative max-w-4xl mx-auto" [smParallax]="0.08">
      <p smReveal="fade-up" class="section-label mb-4">Fine Art Prints</p>
      <h1 smReveal="fade-up" [smRevealDelay]="120" class="font-display text-6xl md:text-7xl font-light mb-6">The Store</h1>
      <p smReveal="fade-up" [smRevealDelay]="200" class="font-body text-white/60 text-lg max-w-xl mx-auto leading-relaxed">
        Museum-quality editorial prints. Archival paper, pigment inks — ready for the wall.
      </p>
    </div>

    <!-- Cart icon -->
    <button
      (click)="cartOpen = true"
      class="fixed top-6 right-20 z-50 flex items-center gap-2 section-label text-white/60 hover:text-white transition-colors"
      aria-label="Open cart"
    >
      Cart
      <span
        *ngIf="(cartCount$ | async) as count"
        class="inline-flex items-center justify-center w-5 h-5 bg-gold-400 text-obsidian-950 text-xs rounded-full"
      >{{ count }}</span>
    </button>
  </header>

  <!-- Product grid -->
  <main class="max-w-6xl mx-auto pb-16 px-6" *ngIf="!(loading$ | async)">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-1">
      <article
        *ngFor="let product of products$ | async; let i = index; trackBy: trackByProductId"
        smReveal="fade-up"
        [smRevealThreshold]="0.05"
        class="group relative overflow-hidden cursor-pointer card-hover"
        [routerLink]="['/store', product._id]"
      >
        <picture>
          <img
            [src]="productImage(product, i)"
            [alt]="product.title"
            class="w-full aspect-square object-cover transition-transform duration-700 group-hover:scale-105"
            loading="lazy"
          />
        </picture>

        <div class="p-5 bg-obsidian-900">
          <h3 class="font-display text-xl mb-1">{{ product.title }}</h3>
          <p class="text-white/50 text-sm mb-3 line-clamp-2">{{ product.description }}</p>
          <div class="flex items-center justify-between">
            <p class="section-label text-gold-400">
              From ${{ product.variants[0]?.price | number:'1.2-2' }}
            </p>
            <span class="section-label text-white/40">{{ product.variants.length }} options</span>
          </div>
        </div>
      </article>
    </div>
  </main>

  <!-- Loading -->
  <div *ngIf="loading$ | async" class="flex justify-center py-32">
    <div class="w-px h-16 bg-gold-400 animate-pulse"></div>
  </div>
</div>

<!-- Cart sidebar -->
<sm-cart-sidebar [isOpen]="cartOpen" (closed)="cartOpen = false"></sm-cart-sidebar>
