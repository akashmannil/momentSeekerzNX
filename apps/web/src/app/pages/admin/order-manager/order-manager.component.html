<div class="p-8">
  <h1 class="font-display text-4xl font-light mb-8">Orders</h1>

  <div *ngIf="loading$ | async" class="flex justify-center py-16">
    <div class="w-px h-12 bg-gold-400 animate-pulse"></div>
  </div>

  <div class="overflow-x-auto" *ngIf="!(loading$ | async)">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-white/10 text-white/40">
          <th class="text-left py-3 pr-6 section-label font-normal">Order #</th>
          <th class="text-left py-3 pr-6 section-label font-normal">Customer</th>
          <th class="text-left py-3 pr-6 section-label font-normal">Items</th>
          <th class="text-left py-3 pr-6 section-label font-normal">Total</th>
          <th class="text-left py-3 pr-6 section-label font-normal">Status</th>
          <th class="text-left py-3 section-label font-normal">Date</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of orders$ | async" class="border-b border-white/5 hover:bg-white/2">
          <td class="py-4 pr-6 font-mono text-xs text-gold-400">{{ order.orderNumber }}</td>
          <td class="py-4 pr-6">
            <p>{{ order.customerName }}</p>
            <p class="text-white/30 text-xs">{{ order.customerEmail }}</p>
          </td>
          <td class="py-4 pr-6 text-white/60">{{ order.items.length }} item(s)</td>
          <td class="py-4 pr-6">${{ order.total | number:'1.2-2' }}</td>
          <td class="py-4 pr-6 capitalize" [class.text-yellow-400]="order.status === 'pending'"
              [class.text-blue-400]="order.status === 'processing'"
              [class.text-green-400]="order.status === 'shipped' || order.status === 'delivered'"
              [class.text-red-400]="order.status === 'cancelled'">
            {{ order.status }}
          </td>
          <td class="py-4 text-white/40">{{ order.createdAt | date:'shortDate' }}</td>
        </tr>
      </tbody>
    </table>

    <p *ngIf="(orders$ | async)?.length === 0" class="text-center text-white/30 py-16 font-display text-2xl italic">
      No orders yet
    </p>
  </div>
</div>
