<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <title>Savage Media</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Savage Media — cinematic photography & fine-art prints by a passionate visual storyteller." />
  <meta name="theme-color" content="#111114" />

  <!-- Open Graph -->
  <meta property="og:title" content="Savage Media" />
  <meta property="og:description" content="Cinematic photography portfolio & fine-art print store." />
  <meta property="og:type" content="website" />

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <style>
    #sm-splash {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111114;
      color: #fff;
      opacity: 1;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #sm-splash .sm-splash-label {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      margin: 0 0 28px;
    }
    #sm-splash .sm-splash-mark {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(48px, 8vw, 88px);
      font-weight: 300;
      letter-spacing: 0.02em;
      line-height: 1;
      text-align: center;
      margin: 0;
    }
    #sm-splash .sm-splash-mark em {
      font-style: italic;
      color: #d4a843;
    }
    #sm-splash .sm-splash-bar {
      margin-top: 40px;
      width: 180px;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      position: relative;
    }
    #sm-splash .sm-splash-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: -40%;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #d4a843, transparent);
      animation: smSplashSweep 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes smSplashSweep {
      0% { left: -40%; }
      100% { left: 100%; }
    }
    html.app-ready #sm-splash {
      opacity: 0;
      pointer-events: none;
    }
    @media (prefers-reduced-motion: reduce) {
      #sm-splash { transition: opacity 0.2s linear; }
      #sm-splash .sm-splash-bar::after {
        animation: none;
        left: 0;
        width: 100%;
        background: #d4a843;
      }
    }
  </style>
</head>
<body class="bg-obsidian-950 text-white antialiased">
  <div id="sm-splash" aria-hidden="true">
    <p class="sm-splash-label">Visual Production Studio</p>
    <h1 class="sm-splash-mark">Savage<br /><em>Media</em></h1>
    <div class="sm-splash-bar"></div>
  </div>

  <sm-root></sm-root>

  <script>
    (function () {
      var splash = document.getElementById('sm-splash');
      if (!splash) return;
      splash.addEventListener('transitionend', function (e) {
        if (e.propertyName === 'opacity' && document.documentElement.classList.contains('app-ready')) {
          splash.parentNode && splash.parentNode.removeChild(splash);
        }
      });
    })();
  </script>
</body>
</html>
