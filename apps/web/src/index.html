<!DOCTYPE html>
<html lang="en" class="dark" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <title>Savage Media</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Savage Media — a full-service visual production studio: photography, cinematic video, aerial, 360° tours, and 3D." />
  <meta name="theme-color" content="#111114" />

  <!-- Open Graph -->
  <meta property="og:title" content="Savage Media" />
  <meta property="og:description" content="Photography, cinematic video, aerial, and 3D — shipped fast for brands, real estate, and creators." />
  <meta property="og:type" content="website" />

  <!-- Inter — sole typeface for the design system -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- Restore saved theme before Angular boots to prevent flash of unstyled content. -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('sm_theme');
        var theme = (saved === 'dark' || saved === 'light')
          ? saved
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <style>
    /* Splash screen — uses CSS custom properties from _theme.scss which are
       injected by Angular before this element is removed. We define fallback
       values inline so the splash renders correctly on first paint. */
    #sm-splash {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000000;               /* --sm-color-base */
      color: #ffffff;                    /* --sm-color-text-primary */
      opacity: 1;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #sm-splash .sm-splash-label {
      font-family: 'Inter', system-ui, sans-serif;  /* --sm-font-primary */
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);   /* --sm-color-text-muted */
      margin: 0 0 28px;
    }
    #sm-splash .sm-splash-mark {
      font-family: 'Inter', system-ui, sans-serif;  /* --sm-font-primary */
      font-size: clamp(48px, 8vw, 88px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 0.95;
      text-align: center;
      margin: 0;
    }
    #sm-splash .sm-splash-mark span {
      color: #de4758;                    /* --sm-color-accent / gold-400 */
    }
    #sm-splash .sm-splash-bar {
      margin-top: 40px;
      width: 180px;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      position: relative;
    }
    #sm-splash .sm-splash-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: -40%;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #de4758, transparent); /* --sm-color-accent */
      animation: smSplashSweep 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes smSplashSweep {
      0%   { left: -40%; }
      100% { left: 100%; }
    }
    html.app-ready #sm-splash {
      opacity: 0;
      pointer-events: none;
    }
    @media (prefers-reduced-motion: reduce) {
      #sm-splash { transition: opacity 0.2s linear; }
      #sm-splash .sm-splash-bar::after {
        animation: none;
        left: 0;
        width: 100%;
        background: #de4758;             /* --sm-color-accent */
      }
    }
  </style>
</head>
<body class="bg-black text-white antialiased">
  <div id="sm-splash" aria-hidden="true">
    <p class="sm-splash-label">Visual Production Studio</p>
    <h1 class="sm-splash-mark">Savage<br /><span>Media</span></h1>
    <div class="sm-splash-bar"></div>
  </div>

  <sm-root></sm-root>

  <script>
    (function () {
      var splash = document.getElementById('sm-splash');
      if (!splash) return;
      splash.addEventListener('transitionend', function (e) {
        if (e.propertyName === 'opacity' && document.documentElement.classList.contains('app-ready')) {
          splash.parentNode && splash.parentNode.removeChild(splash);
        }
      });
    })();
  </script>
</body>
</html>
